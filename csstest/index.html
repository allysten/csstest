<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Styled Page</title>
    
    <style>
        body {
            background-color: #e2e8f0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh; 
            margin: 0;
        }

        .card {
            background-color: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            max-width: 400px;
            text-align: center;
        }

        h1 {
            color: #1e293b;
            margin-top: 0;
        }

        p {
            color: #64748b;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        button {
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.1s ease;
        }

        button:hover {
            background-color: #2563eb;
            transform: scale(1.05); 
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Hello, World! 🌍</h1>
        <p>This is a complete webpage all in one file. The HTML provides the words and structure, and the CSS block at the top makes it look like a modern card.</p>
        <button>Hover over me!</button>
    </div>

</body>
</html>
